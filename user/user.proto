syntax = "proto3";

package trpc.polarbear.user;

option go_package = "github.com/ustcLyric/trpcprotocol/user";

import "user_info.proto";

service UserService {
    rpc GetUserInfo (GetUserInfoReq) returns (GetUserInfoReq){};
    rpc Hello   (GetUserInfoReq) returns (GetUserInfoReq){};
    rpc Hello1  (GetUserInfoReq) returns (GetUserInfoReq){};
}

