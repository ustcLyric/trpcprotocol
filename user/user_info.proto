syntax = "proto3";

package trpc.polarbear.user;

option go_package = "github.com/ustcLyric/trpcprotocol";


message GetUserInfoReq {
    string id = 1;
    string name = 2;
}


message GetUserInfoResp {
    User user = 1;
}

message User {
    string id = 1;
    string name = 2;
    string age = 3;
    string phone = 4;
    string bg = 5;
}